<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilos Míos | Objetos de Hogar</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #F4F3EF;
            --tarjeta: #FFFFFF;
            --verde-seco: #6D8C60;
            --texto-p: #333333;
            --texto-s: #707070;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--fondo); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--texto-p); padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 25px; }
        .header-section { background: var(--tarjeta); padding: 35px 25px; border-radius: 24px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.01); }
        .brand-logo { width: 90px; height: 90px; object-fit: contain; margin-bottom: 15px; }
        .header-section h1 { font-family: 'Lora', serif; font-size: 32px; font-weight: 500; color: var(--texto-p); }
        .header-section p { font-size: 12px; color: var(--texto-s); letter-spacing: 1px; margin-top: 5px; text-transform: uppercase; }
        .bio-section { background: var(--tarjeta); padding: 30px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.01); text-align: center; }
        .bio-section p { font-family: 'Lora', serif; font-size: 15px; font-style: italic; line-height: 1.6; color: #555; }
        .catalogo-titulo { font-family: 'Lora', serif; font-size: 22px; font-weight: 500; margin-top: 10px; padding-left: 5px; color: var(--texto-p); }
        .product-card { background: var(--tarjeta); border-radius: 24px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.01); }
        .product-image { width: 100%; height: 350px; object-fit: cover; background-color: #EAE8E3; display: flex; align-items: center; justify-content: center; color: #909090; font-size: 13px; }
        .product-info { padding: 25px; }
        .product-title { font-family: 'Lora', serif; font-size: 20px; font-weight: 500; margin-bottom: 6px; }
        .product-desc { font-size: 13px; color: var(--texto-s); line-height: 1.5; margin-bottom: 15px; }
        .product-meta { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #F4F3EF; padding-top: 15px; }
        .product-price { font-family: 'Lora', serif; font-size: 19px; font-weight: 500; }
        .btn-order { font-size: 13px; color: var(--verde-seco); text-decoration: none; font-weight: 500; border-bottom: 1px solid var(--verde-seco); }
        footer { text-align: center; font-size: 11px; color: #A0A0A0; margin-top: 10px; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-section">
            <img src="HILOSMIOS_ISO VERDE.png" alt="Logo Hilos Míos" class="brand-logo">
            <h1>Hilos Míos</h1>
            <p>Objetos de Hogar</p>
        </header>

        <section class="bio-section">
            <p>“Todo lo que lleva cariño en su intención hace bien, regalá un regalo único de colecciones limitadas y un recuerdo que perdura”</p>
        </section>

        <h2 class="catalogo-titulo">Colección</h2>
        <div id="catalogo-container"></div>
        <footer>hilosmíos.com &copy; 2026</footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAjBcCNgJ9w4xn1NUepCNFxKHNPApBc7Gg",
          authDomain: "web-hm-26d01.firebaseapp.com",
          projectId: "web-hm-26d01",
          storageBucket: "web-hm-26d01.firebasestorage.app",
          messagingSenderId: "411959120061",
          appId: "1:411959120061:web:a7fdb2eedbd477700227d4",
          measurementId: "G-H30SWYLK5B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "productos"), (snapshot) => {
            const container = document.getElementById('catalogo-container');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                container.innerHTML += `
                    <div class="product-card" style="margin-bottom: 25px;">
                        <img class="product-image" src="${p.imagen || 'https://via.placeholder.com/500x350?text=Hilos+Mios'}" alt="${p.titulo}">
                        <div class="product-info">
                            <h3 class="product-title">${p.titulo}</h3>
                            <p class="product-desc">${p.descripcion}</p>
                            <div class="product-meta">
                                <span class="product-price">$${p.precio}</span>
                                <a href="https://wa.me/TU_TELEFONO" class="btn-order" target="_blank">Consultar</a>
                            </div>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
